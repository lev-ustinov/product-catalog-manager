<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" font-family="Helvetica, Arial, sans-serif">

  <!-- ============ Background ============ -->
  <rect x="0" y="0" width="1000" height="800" fill="#ffffff"/>

  <!-- ============ 1. Browser / SPA ============ -->
  <rect x="320" y="20" width="360" height="80" rx="10"
        fill="#e8f0fe" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="500" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#1c2e7a">
    Browser — SPA (app/index.html)
  </text>
  <text x="500" y="68" text-anchor="middle" font-size="12" fill="#3b5bdb">
    vanilla JS · fetch() · Chart.js · localStorage (JWT)
  </text>

  <!-- arrow 1 -->
  <line x1="500" y1="100" x2="500" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="514" y="122" font-size="11.5" fill="#555">HTTPS · Authorization: Bearer &lt;JWT&gt;</text>

  <!-- ============ 2. FastAPI application ============ -->
  <rect x="40" y="140" width="920" height="290" rx="10"
        fill="#eaf6ee" stroke="#3a7a50" stroke-width="1.5"/>
  <text x="60" y="166" font-size="15" font-weight="700" fill="#1f4d30">
    FastAPI application — app/main.py
  </text>

  <!-- router boxes: row 1 -->
  <g font-size="12" fill="#1f4d30">
    <rect x="60"  y="182" width="160" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="140" y="202" text-anchor="middle" font-weight="700">auth.py</text>
    <text x="140" y="220" text-anchor="middle" font-size="11">/auth/login</text>
    <text x="140" y="234" text-anchor="middle" font-size="11">JWT + bcrypt, RBAC</text>

    <rect x="240" y="182" width="290" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="385" y="202" text-anchor="middle" font-weight="700">category.py · product.py · enums.py · params.py</text>
    <text x="385" y="220" text-anchor="middle" font-size="11">catalog tree, products, configurable parameters</text>
    <text x="385" y="234" text-anchor="middle" font-size="11">parameter-based search &amp; aggregates</text>

    <rect x="550" y="182" width="170" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="635" y="202" text-anchor="middle" font-weight="700">xo.py</text>
    <text x="635" y="220" text-anchor="middle" font-size="11">business operations (XO)</text>
    <text x="635" y="234" text-anchor="middle" font-size="11">draft → posted / cancelled</text>

    <rect x="740" y="182" width="200" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="840" y="202" text-anchor="middle" font-weight="700">dashboard.py</text>
    <text x="840" y="220" text-anchor="middle" font-size="11">/api/dashboard/stats</text>
    <text x="840" y="234" text-anchor="middle" font-size="11">/api/analytics (charts)</text>
  </g>

  <!-- router boxes: row 2 -->
  <g font-size="12" fill="#1f4d30">
    <rect x="60"  y="258" width="160" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="140" y="278" text-anchor="middle" font-weight="700">export.py</text>
    <text x="140" y="296" text-anchor="middle" font-size="11">CSV export</text>
    <text x="140" y="310" text-anchor="middle" font-size="11">UTF-8 BOM for Excel</text>

    <rect x="240" y="258" width="160" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="320" y="278" text-anchor="middle" font-weight="700">users.py</text>
    <text x="320" y="296" text-anchor="middle" font-size="11">/api/users — admin only</text>
    <text x="320" y="310" text-anchor="middle" font-size="11">create / role / activate</text>

    <rect x="420" y="258" width="160" height="62" rx="6" fill="#ffffff" stroke="#3a7a50"/>
    <text x="500" y="278" text-anchor="middle" font-weight="700">audit.py</text>
    <text x="500" y="296" text-anchor="middle" font-size="11">/api/audit — admin only</text>
    <text x="500" y="310" text-anchor="middle" font-size="11">paginated, filterable</text>

    <!-- audit_log helper, highlighted, spans wide -->
    <rect x="600" y="258" width="340" height="62" rx="6" fill="#fff8e1" stroke="#c9941b" stroke-width="1.5"/>
    <text x="770" y="278" text-anchor="middle" font-weight="700" fill="#7a5a00">audit_log.py — log_action()</text>
    <text x="770" y="296" text-anchor="middle" font-size="11" fill="#7a5a00">shared helper, called after every create / update /</text>
    <text x="770" y="310" text-anchor="middle" font-size="11" fill="#7a5a00">delete / post / cancel — own commit, never rolls back caller</text>
  </g>

  <!-- thin connector lines from row-1 routers down into audit_log -->
  <g stroke="#c9941b" stroke-width="1" stroke-dasharray="3,3" fill="none">
    <path d="M385,244 C 385,255 770,250 770,258"/>
    <path d="M635,244 C 635,255 770,250 770,258"/>
    <path d="M320,320 L 320,330 L 600,330 L 600,289"/>
  </g>

  <!-- bottom note inside FastAPI box -->
  <text x="500" y="412" text-anchor="middle" font-size="11.5" fill="#1f4d30" font-style="italic">
    CORS enabled · Swagger UI at /docs · static SPA served at /ui
  </text>

  <!-- arrow 2 -->
  <line x1="500" y1="430" x2="500" y2="465" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="514" y="452" font-size="11.5" fill="#555">SQLAlchemy ORM (psycopg2)</text>

  <!-- ============ 3. PostgreSQL ============ -->
  <rect x="40" y="470" width="920" height="230" rx="10"
        fill="#eaf2fb" stroke="#336791" stroke-width="1.5"/>
  <text x="60" y="496" font-size="15" font-weight="700" fill="#1c3a5c">
    PostgreSQL 15 — product_catalog
  </text>

  <!-- init.sql box -->
  <rect x="60" y="512" width="540" height="160" rx="6" fill="#ffffff" stroke="#336791"/>
  <text x="330" y="534" text-anchor="middle" font-size="13" font-weight="700" fill="#1c3a5c">
    init.sql — schema, PL/pgSQL functions &amp; seed data
  </text>
  <text x="330" y="556" text-anchor="middle" font-size="11.5" fill="#1c3a5c">
    Tables: category · product · param_definition · enum_class / enum_value
  </text>
  <text x="330" y="574" text-anchor="middle" font-size="11.5" fill="#1c3a5c">
    category_param · product_param_* · xo_class · xo_instance · xo_line · ...
  </text>
  <text x="330" y="598" text-anchor="middle" font-size="11.5" fill="#1c3a5c">
    Business-logic functions: add_category, move_category, add_product,
  </text>
  <text x="330" y="616" text-anchor="middle" font-size="11.5" fill="#1c3a5c">
    create_xo_instance, post_xo, cancel_xo (role &amp; status validation)
  </text>
  <text x="330" y="640" text-anchor="middle" font-size="11.5" fill="#1c3a5c">
    Seed data: 19 categories · 9 products · 5 XO instances
  </text>
  <text x="330" y="658" text-anchor="middle" font-size="11" fill="#5a7a99" font-style="italic">
    applied once via: psql ... -f init.sql
  </text>

  <!-- alembic box -->
  <rect x="620" y="512" width="340" height="160" rx="6" fill="#ffffff" stroke="#336791"/>
  <text x="790" y="534" text-anchor="middle" font-size="13" font-weight="700" fill="#1c3a5c">
    alembic/versions/ — incremental tables
  </text>
  <text x="790" y="558" text-anchor="middle" font-size="11.5" fill="#1c3a5c">app_user</text>
  <text x="790" y="576" text-anchor="middle" font-size="11.5" fill="#1c3a5c">audit_log</text>
  <text x="790" y="600" text-anchor="middle" font-size="11" fill="#1c3a5c">
    id · username · password_hash · role · is_active
  </text>
  <text x="790" y="616" text-anchor="middle" font-size="11" fill="#1c3a5c">
    id · timestamp · user_login · action ·
  </text>
  <text x="790" y="630" text-anchor="middle" font-size="11" fill="#1c3a5c">
    entity_type · entity_id · details
  </text>
  <text x="790" y="654" text-anchor="middle" font-size="11" fill="#5a7a99" font-style="italic">
    applied via: alembic upgrade head
  </text>

  <!-- ============ 4. seed_demo_data.py (optional, dashed) ============ -->
  <rect x="700" y="730" width="260" height="58" rx="8"
        fill="#ffffff" stroke="#888888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="830" y="752" text-anchor="middle" font-size="12.5" font-weight="700" fill="#555">
    app/seed_demo_data.py
  </text>
  <text x="830" y="770" text-anchor="middle" font-size="11" fill="#555">
    optional · idempotent demo users + audit history
  </text>

  <path d="M790,700 L790,712 L830,712 L830,730" fill="none" stroke="#888" stroke-width="1.3"
        stroke-dasharray="4,3" marker-end="url(#arrowgrey)"/>

  <!-- ============ run-order footnote ============ -->
  <text x="40" y="772" font-size="12" fill="#333">
    Run order:
  </text>
  <text x="40" y="790" font-size="12" font-family="monospace" fill="#333">
    psql -f init.sql  →  alembic upgrade head  →  uvicorn main:app  →  (optional) python seed_demo_data.py
  </text>

  <!-- ============ arrow marker defs ============ -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrowgrey" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

</svg>
